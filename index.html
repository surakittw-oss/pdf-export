<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor - ย่อขนาดไฟล์ PDF</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF.js สำหรับอ่านไฟล์ PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // ตั้งค่า Worker สำหรับ PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <!-- jsPDF สำหรับสร้างไฟล์ PDF ใหม่ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .drop-zone {
            transition: all 0.2s ease-in-out;
        }

        .drop-zone.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800">

    <div class="max-w-3xl mx-auto pt-12 px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-2 flex items-center justify-center gap-2">
                <i data-lucide="file-down" class="w-8 h-8 text-blue-600"></i>
                ระบบย่อขนาดไฟล์ PDF
            </h1>
            <p class="text-gray-600">ลดขนาดไฟล์เอกสารของคุณง่ายๆ ปลอดภัย 100% (ทำงานบนเครื่องของคุณ
                ไม่มีการอัปโหลดสู่เซิร์ฟเวอร์)</p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden p-8 border border-gray-100">

            <!-- Upload Zone -->
            <div id="dropZone"
                class="drop-zone border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer hover:bg-gray-50 mb-6">
                <input type="file" id="fileInput" accept="application/pdf" class="hidden">
                <div class="flex flex-col items-center justify-center space-y-4">
                    <div class="bg-blue-100 p-4 rounded-full text-blue-600">
                        <i data-lucide="upload-cloud" class="w-10 h-10"></i>
                    </div>
                    <div>
                        <p class="text-lg font-medium text-gray-700">คลิกที่นี่เพื่อเลือกไฟล์ PDF</p>
                        <p class="text-sm text-gray-500 mt-1">หรือลากไฟล์ PDF มาวางตรงนี้</p>
                    </div>
                </div>
            </div>

            <!-- File Info (Hidden initially) -->
            <div id="fileInfo"
                class="hidden bg-blue-50 border border-blue-100 rounded-lg p-4 mb-6 flex items-center justify-between">
                <div class="flex items-center space-x-3 truncate">
                    <i data-lucide="file-text" class="w-6 h-6 text-blue-500 flex-shrink-0"></i>
                    <div class="truncate">
                        <p id="fileName" class="font-medium text-sm text-gray-800 truncate"></p>
                        <p id="fileSize" class="text-xs text-gray-500"></p>
                    </div>
                </div>
                <button id="removeFileBtn" class="text-gray-400 hover:text-red-500 p-2">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Settings & Action (Hidden initially) -->
            <div id="actionArea" class="hidden space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">เลือกระดับคุณภาพ
                        (มีผลต่อความคมชัดและขนาดไฟล์)</label>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="quality" value="low" class="peer sr-only">
                            <div
                                class="p-3 border border-gray-200 rounded-lg text-center peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-gray-50 transition-colors">
                                <p class="font-medium text-gray-800">ย่อให้เล็กที่สุด</p>
                                <p class="text-xs text-gray-500 mt-1">ไฟล์เล็กมาก แต่อาจเบลอเล็กน้อย</p>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="quality" value="medium" class="peer sr-only" checked>
                            <div
                                class="p-3 border border-gray-200 rounded-lg text-center peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-gray-50 transition-colors">
                                <p class="font-medium text-gray-800">แนะนำ (สมดุล)</p>
                                <p class="text-xs text-gray-500 mt-1">คุณภาพดี ขนาดเล็กลงพอสมควร</p>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="quality" value="high" class="peer sr-only">
                            <div
                                class="p-3 border border-gray-200 rounded-lg text-center peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-gray-50 transition-colors">
                                <p class="font-medium text-gray-800">เน้นความคมชัด</p>
                                <p class="text-xs text-gray-500 mt-1">ชัดเจนสุด แต่ไฟล์อาจจะลดไม่มาก</p>
                            </div>
                        </label>
                    </div>
                </div>

                <button id="compressBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg flex items-center justify-center space-x-2 transition-colors">
                    <i data-lucide="zap" class="w-5 h-5"></i>
                    <span>เริ่มย่อขนาดไฟล์</span>
                </button>
            </div>

            <!-- Processing / Progress Area -->
            <div id="progressArea" class="hidden py-8 text-center">
                <div class="flex justify-center mb-4">
                    <div class="spinner"></div>
                </div>
                <h3 class="text-lg font-medium text-gray-800 mb-2">กำลังประมวลผล...</h3>
                <div class="w-full bg-gray-200 rounded-full h-2.5 mb-2 max-w-md mx-auto overflow-hidden">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300"
                        style="width: 0%"></div>
                </div>
                <p id="progressText" class="text-sm text-gray-500">กำลังเตรียมไฟล์...</p>
                <p
                    class="text-xs text-amber-600 mt-4 bg-amber-50 inline-block px-3 py-1 rounded-full border border-amber-100">
                    <i data-lucide="alert-circle" class="w-3 h-3 inline mr-1"></i>
                    กรุณาอย่าปิดแท็บนี้จนกว่าจะเสร็จสิ้น
                </p>
            </div>

            <!-- Result Area -->
            <div id="resultArea" class="hidden py-6 text-center">
                <div
                    class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="check-circle" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">ย่อไฟล์สำเร็จ!</h3>

                <div class="flex justify-center items-center space-x-4 text-sm mb-6">
                    <div class="bg-gray-100 px-4 py-2 rounded-lg">
                        <p class="text-gray-500 text-xs">ขนาดเดิม</p>
                        <p id="oldSizeTxt" class="font-medium line-through text-gray-400"></p>
                    </div>
                    <i data-lucide="arrow-right" class="w-5 h-5 text-gray-400"></i>
                    <div class="bg-green-50 px-4 py-2 rounded-lg border border-green-200">
                        <p class="text-green-600 text-xs font-medium">ขนาดใหม่</p>
                        <p id="newSizeTxt" class="font-bold text-green-700"></p>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 justify-center">
                    <button id="downloadBtn"
                        class="bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-6 rounded-lg flex items-center justify-center space-x-2 transition-colors">
                        <i data-lucide="download" class="w-5 h-5"></i>
                        <span>ดาวน์โหลดไฟล์</span>
                    </button>
                    <button id="resetBtn"
                        class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 px-6 rounded-lg transition-colors">
                        ย่อไฟล์อื่นต่อ
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const removeFileBtn = document.getElementById('removeFileBtn');
        const actionArea = document.getElementById('actionArea');
        const compressBtn = document.getElementById('compressBtn');
        const progressArea = document.getElementById('progressArea');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const resultArea = document.getElementById('resultArea');
        const oldSizeTxt = document.getElementById('oldSizeTxt');
        const newSizeTxt = document.getElementById('newSizeTxt');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        let currentFile = null;
        let compressedBlob = null;

        // Settings mapping (Scale = ความละเอียดตอนเรนเดอร์, Quality = การบีบอัดภาพ JPEG)
        const QUALITY_SETTINGS = {
            'low': { scale: 1.5, jpegQuality: 0.5 },    // เหมาะกับ text ล้วน, เล็กสุดๆ
            'medium': { scale: 2.0, jpegQuality: 0.7 }, // สมดุล แนะนำสำหรับเอกสารทั่วไป
            'high': { scale: 3.0, jpegQuality: 0.85 }   // ชัดเจน ภาพไม่แตก
        };

        // Utility: Format File Size
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // Event Listeners for Drag & Drop
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('active');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('active');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        removeFileBtn.addEventListener('click', resetUI);
        resetBtn.addEventListener('click', resetUI);

        function handleFileSelect(file) {
            if (file.type !== 'application/pdf') {
                alert('กรุณาเลือกไฟล์ PDF เท่านั้นครับ');
                return;
            }

            currentFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatBytes(file.size);

            dropZone.classList.add('hidden');
            fileInfo.classList.remove('hidden');
            actionArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
        }

        function resetUI() {
            currentFile = null;
            compressedBlob = null;
            fileInput.value = '';

            dropZone.classList.remove('hidden');
            fileInfo.classList.add('hidden');
            actionArea.classList.add('hidden');
            progressArea.classList.add('hidden');
            resultArea.classList.add('hidden');

            progressBar.style.width = '0%';
            progressText.textContent = '';
        }

        // Core Compression Logic
        compressBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            // Get selected quality
            const selectedQuality = document.querySelector('input[name="quality"]:checked').value;
            const settings = QUALITY_SETTINGS[selectedQuality];

            // UI Changes
            actionArea.classList.add('hidden');
            fileInfo.classList.add('hidden');
            progressArea.classList.remove('hidden');

            try {
                // 1. อ่านไฟล์ PDF
                const arrayBuffer = await currentFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const numPages = pdf.numPages;

                // 2. สร้าง jsPDF instance (รอตั้งค่าขนาดหน้าตอนลูป)
                const { jsPDF } = window.jspdf;
                let newPdf = null;

                for (let i = 1; i <= numPages; i++) {
                    // Update Progress UI
                    const percent = Math.round((i / numPages) * 100);
                    progressBar.style.width = `${percent}%`;
                    progressText.textContent = `กำลังประมวลผลหน้า ${i} จาก ${numPages}...`;

                    // ดึงข้อมูลหน้า PDF
                    const page = await pdf.getPage(i);

                    // วิเคราะห์ขนาด: unscaled สำหรับขนาดเอกสารจริง, scaled สำหรับเรนเดอร์ภาพชัดๆ
                    const unscaledViewport = page.getViewport({ scale: 1.0 });
                    const renderViewport = page.getViewport({ scale: settings.scale });

                    // 3. เรนเดอร์ลง Canvas
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = renderViewport.width;
                    canvas.height = renderViewport.height;

                    await page.render({
                        canvasContext: ctx,
                        viewport: renderViewport
                    }).promise;

                    // 4. แปลงภาพเป็น JPEG เพื่อลดขนาด
                    const imgData = canvas.toDataURL('image/jpeg', settings.jpegQuality);

                    // 5. เพิ่มรูปลงใน PDF ใหม่
                    // เช็คว่าแนวตั้งหรือแนวนอน เพื่อตั้งค่า orientation ให้ตรง
                    const orientation = unscaledViewport.width > unscaledViewport.height ? 'l' : 'p';
                    const format = [unscaledViewport.width, unscaledViewport.height];

                    if (i === 1) {
                        // หน้าแรก สร้าง instance ใหม่
                        newPdf = new jsPDF({
                            orientation: orientation,
                            unit: 'pt', // ใช้ point จะตรงกับขนาด viewport ของ pdf.js พอดี
                            format: format
                        });
                    } else {
                        // หน้าต่อไป เพิ่มหน้าใหม่
                        newPdf.addPage(format, orientation);
                    }

                    // แปะรูปลงไป (ใช้ขนาด unscaled เพื่อให้หน้าเอกสารมีขนาดทางกายภาพเท่าเดิม)
                    newPdf.addImage(imgData, 'JPEG', 0, 0, unscaledViewport.width, unscaledViewport.height);
                }

                // 6. แปลงกลับเป็น Blob
                progressText.textContent = "กำลังสร้างไฟล์ใหม่...";
                compressedBlob = newPdf.output('blob');

                // 7. แสดงผลลัพธ์
                showResult(currentFile.size, compressedBlob.size);

            } catch (error) {
                console.error("Compression Error:", error);
                alert("เกิดข้อผิดพลาดในการประมวลผลไฟล์ กรุณาลองใหม่อีกครั้งครับ");
                resetUI();
            }
        });

        function showResult(originalSize, newSize) {
            progressArea.classList.add('hidden');
            resultArea.classList.remove('hidden');

            oldSizeTxt.textContent = formatBytes(originalSize);
            newSizeTxt.textContent = formatBytes(newSize);

            // ถ้าขนาดใหม่ใหญ่กว่าเดิม ให้แจ้งเตือนนิดหน่อย
            if (newSize >= originalSize) {
                newSizeTxt.classList.remove('text-green-700');
                newSizeTxt.classList.add('text-amber-600');
                newSizeTxt.parentElement.classList.remove('bg-green-50', 'border-green-200');
                newSizeTxt.parentElement.classList.add('bg-amber-50', 'border-amber-200');

                // แจ้งเหตุผล
                const infoMsg = document.createElement('p');
                infoMsg.className = "text-xs text-amber-600 mt-2";
                infoMsg.textContent = "หมายเหตุ: ไฟล์ต้นฉบับอาจถูกบีบอัดมาอย่างดีแล้ว หรือมีเนื้อหาแบบข้อความล้วน การแปลงเป็นภาพอาจทำให้ขนาดไม่ลดลง ลองเลือกระดับ 'ย่อให้เล็กที่สุด' แทนครับ";
                if (!document.getElementById('infoMsgWarn')) {
                    infoMsg.id = 'infoMsgWarn';
                    resultArea.insertBefore(infoMsg, resultArea.children[3]);
                }
            } else {
                const warnMsg = document.getElementById('infoMsgWarn');
                if (warnMsg) warnMsg.remove();

                newSizeTxt.classList.add('text-green-700');
                newSizeTxt.classList.remove('text-amber-600');
                newSizeTxt.parentElement.classList.add('bg-green-50', 'border-green-200');
                newSizeTxt.parentElement.classList.remove('bg-amber-50', 'border-amber-200');
            }
        }

        // จัดการปุ่มดาวน์โหลด
        downloadBtn.addEventListener('click', () => {
            if (!compressedBlob) return;

            const url = URL.createObjectURL(compressedBlob);
            const a = document.createElement('a');

            // ตั้งชื่อไฟล์ใหม่โดยเติม _compressed
            const originalName = currentFile.name;
            const newName = originalName.replace(/\.[^/.]+$/, "") + "_compressed.pdf";

            a.href = url;
            a.download = newName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

    </script>
</body>

</html>
